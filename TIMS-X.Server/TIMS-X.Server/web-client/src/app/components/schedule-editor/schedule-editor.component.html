<div class="form-background">
    <form [formGroup]="scheduleForm" a (ngSubmit)="onSubmit()" autocomplete="off" novalidate (keyup.enter)="onSubmit()"
        class="modal-lg">
        <div class="modal-body">
            <!-- Details -->
            <fieldset>
                <legend><span>Details</span><span *ngIf="!canEditSchedule"
                        style="font-size: 12px; color: #FF0000;">&nbsp;read only</span>
                </legend>
                <div class="row row-cols-2">
                    <!-- Left -->
                    <div class="col">
                        <div class="row">
                            <div class="col-5">
                                <label class="col-form-label tims-label" for="providerid">Provider</label>
                            </div>
                            <div *ngIf="isNew()" class="col-7 position-relative">
                                <ng-multiselect-dropdown style="font-size: 14px;" [placeholder]="'choose'"
                                    class="required-control" [settings]="providerDropdownSettings"
                                    [formControlName]="'selectedProviders'"
                                    [data]="ts.providerStore.provider_summary_list">
                                </ng-multiselect-dropdown>
                                <div class="invalid-tooltip">Required</div>
                            </div>

                            <div *ngIf="!isNew()" class="col-7 position-relative">
                                <select
                                    class="form-control form-control-sm focus-ring focus-ring tims-input required-control"
                                    [formControlName]="'providerid'"
                                    [ngClass]="{ 'is-invalid': f['providerid'].touched && f['providerid'].errors }">
                                    <option [ngValue]="null">choose</option>
                                    <option *ngFor="let p of ts.providerStore.provider_summary_list" [value]="p.id">
                                        {{p.firstName}}
                                        {{p.lastName}}</option>
                                </select>
                                <div class="invalid-tooltip">Required</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-5">
                                <label class="col-form-label tims-label" for="siteid">Site</label>
                            </div>
                            <div *ngIf="isNew()" class="col-7 position-relative">
                                <ng-multiselect-dropdown style="font-size: 14px;" [placeholder]="'choose'"
                                    class="required-control" [settings]="siteDropdownSettings"
                                    [formControlName]="'selectedSites'" [data]="ts.siteStore.site_list">
                                </ng-multiselect-dropdown>
                                <div class="invalid-tooltip">Required</div>
                            </div>
                            <div *ngIf="!isNew()" class="col-sm-7 position-relative">
                                <select
                                    class="form-control form-control-sm focus-ring focus-ring tims-input required-control"
                                    name="siteid" [formControlName]="'siteid'"
                                    [ngClass]="{ 'is-invalid': f['siteid'].touched && f['siteid'].errors }">
                                    <option [ngValue]="null">choose</option>
                                    <option *ngFor="let p of ts.siteStore.site_list" [value]="p.id">
                                        {{p.name}}</option>
                                </select>
                                <div class="invalid-tooltip">Required</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-5">
                                <label class="col-form-label tims-label" for="siteid">Subject</label>
                            </div>

                            <div class="col-sm-7 position-relative">
                                <input type="text"
                                    class="form-control form-control-sm focus-ring focus-ring tims-input required-control"
                                    [formControlName]="'subject'" placeholder="subject"
                                    [ngClass]="{ 'is-invalid': f['subject'].touched && f['subject'].errors }">
                                <div class="invalid-tooltip">Required</div>
                            </div>
                        </div>
                    </div>

                    <!-- Right -->
                    <div class="col">
                        <div class="row">
                            <div class="col-sm-6">
                                <label class="col-form-label tims-label" for="siteid">Location</label>
                            </div>

                            <div class="col-sm-6 position-relative">
                                <input type="text" class="form-control form-control-sm focus-ring focus-ring tims-input"
                                    [formControlName]="'location'" placeholder="location"
                                    [ngClass]="{ 'is-invalid': f['location'].touched && f['location'].errors }">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6">
                                <label class="col-form-label tims-label" for="siteid">Color</label>
                            </div>

                            <div class="col-sm-6 position-relative">
                                <input class="form-control form-control-sm focus-ring focus-ring tims-input"
                                    [style.background]="backgroundColor" [cpAlphaChannel]="'disabled'" readonly
                                    [cpDisabled]="cpIsDisabled" [(colorPicker)]="backgroundColor" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row row-cols-2">
                    <div class="col">
                        <div class="row">
                            <div class="col-5">
                                <label class="col-form-label tims-label" for="date">Date/Time</label>
                            </div>
                            <div class="col-7 position-relative">
                                <input class="form-control form-control-sm focus-ring focus-ring tims-input"
                                    placeholder="date" bsDatepicker #dp="bsDatepicker" [bsConfig]="bsConfig"
                                    [formControlName]="'date'" required
                                    [ngClass]="{ 'is-invalid': f['date'].touched && f['date'].errors }">
                                <div class="invalid-tooltip">Required</div>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="row">
                            <div class="col-12">
                                <div class="col" style="display: flex; align-items: center;">
                                    <label class="col-form-label tims-label">Start:</label>
                                    <app-time-entry #startElement class="d-inline"
                                        [(dateTime)]="startTime"></app-time-entry>
                                    <label class="col-form-label tims-label">End:</label>
                                    <app-time-entry #endElement class="d-inline"
                                        [(dateTime)]="endTime"></app-time-entry>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row row-cols-2">
                    <div class="col">
                        <div class="row">
                            <div class="col-5">
                                <label class="col-form-label tims-label">Duration</label>
                            </div>
                            <div class="col-7">
                                <app-duration-entry #duranceEditor [(minutes)]="duration"></app-duration-entry>
                            </div>
                        </div>
                    </div>
                </div>

                <ul class="nav nav-tabs" style="margin: 0 -2px;">
                    <li class="nav-item">
                        <div class="nav-link" (click)="handlesNotesClick()" [ngClass]="{ 'active': isNotesSelected }">
                            Notes
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="nav-link" (click)="handlesRecurrenceClick()"
                            [ngClass]="{ 'active': !isNotesSelected }">
                            Recurrence</div>
                    </li>
                </ul>
                <div class="row">
                    <div class="col-sm-12" style="height: 150px;">
                        <textarea *ngIf="isNotesSelected" type="text" style="margin: 5px 0"
                            class="form-control form-control-sm focus-ring tims-input" [formControlName]="'notes'"
                            rows="6"></textarea>
                        <div style="padding-top: 3px;">
                            <app-recurrence-editor *ngIf="!isNotesSelected" #recurranceEditor
                                [recurrenceForm]="scheduleForm"></app-recurrence-editor>
                        </div>
                    </div>
                </div>
                <div *ngIf="!isNew()"
                    style="margin-left: 10px; margin-top: 5px; font-size: 12px; font-style: italic; color: lightslategray;">
                    <span>{{LastUpdate}}</span>
                </div>
            </fieldset>
        </div>

        <div style="align-items: flex-start;" class="modal-footer">
            <div class="me-auto">
                <app-validation-results *ngIf="hasValidationMessage()"
                    [results]="ts.scheduleStore.validation_results"></app-validation-results>
                <div *ngIf="errorMessage"><span style="color: #ff2200;">{{errorMessage}}</span>
                </div>
                <div *ngIf="displayDeleteMessage"><span style="color: #FF7700;">{{deleteMessage}}</span></div>
                <div *ngIf="displayDeleteInstanceMessage"><span style="color: #FF7700;">{{deleteMessage}}</span>
                </div>
            </div>

            <div style="width: auto;" class="input-group input-group-sm justify-content-end">
                <button class="btn tims-button gradient" type="button" data-bs-toggle="tooltip" title="Save"
                    *ngIf="showSave()" (click)="onSubmit()"><i class="dialog-button bi bi-floppy-fill"></i></button>
                <button *ngIf="showDelete() && showDeleteSingle && isRecurring()" type="button"
                    class="btn tims-button gradient" data-bs-toggle="tooltip"
                    title="Delete this single instance of the series" (click)="onDeleteOccurrence()"><i
                        class="dialog-button bi bi-calendar-x"></i></button>
                <button *ngIf="showDelete()" type="button" class="btn tims-button gradient" data-bs-toggle="tooltip"
                    title="Delete" (click)="onDelete()"><i class="dialog-button bi bi-trash-fill"></i></button>
                <button class="btn tims-button gradient" type="button" (click)="onCancel()" data-bs-toggle="tooltip"
                    title="Close without saving"><i class="dialog-button bi bi-x-square-fill"></i></button>
            </div>
        </div>
    </form>
</div>
